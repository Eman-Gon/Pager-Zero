services:
  neo4j:
    image: neo4j:5
    environment:
      NEO4J_AUTH: neo4j/devpassword
    ports:
      - "7474:7474"
      - "7687:7687"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:7474 || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 24

  sensor:
    build: ./services/sensor
    volumes:
      - ./target-repo:/target:ro
      # hide the host's (darwin) node_modules; the sensor installs linux deps here
      - /target/node_modules
    environment:
      NEO4J_URL: bolt://neo4j:7687
      NEO4J_USER: neo4j
      NEO4J_PASSWORD: devpassword
      TARGET_DIR: /target
      PORT: "3003"
    ports:
      - "3003:3003"
    depends_on:
      neo4j:
        condition: service_healthy
