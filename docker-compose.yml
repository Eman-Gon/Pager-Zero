services:
  rocketride:
    # GHCR image is linux/amd64 only — Apple Silicon runs it via emulation.
    # Built from services/rocketride/Dockerfile, which pre-seeds a working `uv`
    # so the engine's startup bootstrap doesn't crash under emulation.
    platform: linux/amd64
    build: ./services/rocketride
    image: rescueops/rocketride-engine:patched
    ports:
      - "5565:5565"
    # The engine image ships curl (not wget) and serves HTTP on :5565 (the
    # WebSocket lives at /task/service). A plain GET / returns 200 once ready.
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:5565/ -o /dev/null || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 24

  neo4j:
    profiles: ["local-neo4j"]
    image: neo4j:5
    environment:
      NEO4J_AUTH: neo4j/devpassword
    ports:
      - "7474:7474"
      - "7687:7687"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:7474 || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 24

  responder:
    build: ./services/responder
    volumes:
      - ./target-repo:/target:ro
    environment:
      ROCKETRIDE_APIKEY: ${ROCKETRIDE_APIKEY:-}
      ROCKETRIDE_URI: ${ROCKETRIDE_URI:-ws://rocketride:5565}
      BUTTERBASE_GATEWAY_URL: ${BUTTERBASE_GATEWAY_URL:-https://api.butterbase.ai/v1}
      BUTTERBASE_API_KEY: ${BUTTERBASE_API_KEY:-}
      BUTTERBASE_CHAT_MODEL: ${BUTTERBASE_CHAT_MODEL:-anthropic/claude-sonnet-4.6}
      BUTTERBASE_MCP_ENDPOINT: ${BUTTERBASE_MCP_ENDPOINT:-https://api.butterbase.ai/mcp}
      BUTTERBASE_APP_ID: ${BUTTERBASE_APP_ID:-}
      BUTTERBASE_API_URL: ${BUTTERBASE_API_URL:-https://api.butterbase.ai}
      BUTTERBASE_PLAN_CREDITS: ${BUTTERBASE_PLAN_CREDITS:-5}
      DEMO_AUTO_CREDITS: ${DEMO_AUTO_CREDITS:-1}
      NEBIUS_BASE_URL: ${NEBIUS_BASE_URL:-https://api.tokenfactory.nebius.com/v1}
      NEBIUS_API_KEY: ${NEBIUS_API_KEY:-}
      NEBIUS_CHAT_MODEL: ${NEBIUS_CHAT_MODEL:-meta-llama/Meta-Llama-3.1-70B-Instruct}
      NEBIUS_EMBED_MODEL: ${NEBIUS_EMBED_MODEL:-}
      DAYTONA_API_KEY: ${DAYTONA_API_KEY:-}
      DAYTONA_API_URL: ${DAYTONA_API_URL:-}
      GITHUB_TOKEN: ${GITHUB_TOKEN:-}
      GITHUB_REPO: ${GITHUB_REPO:-}
      NEO4J_URL: ${NEO4J_URL:-${NEO4J_URI:-bolt://host.docker.internal:7687}}
      NEO4J_URI: ${NEO4J_URI:-}
      NEO4J_USER: ${NEO4J_USER:-${NEO4J_USERNAME:-neo4j}}
      NEO4J_USERNAME: ${NEO4J_USERNAME:-}
      NEO4J_PASSWORD: ${NEO4J_PASSWORD:-devpassword}
      NEO4J_DATABASE: ${NEO4J_DATABASE:-}
      SENSOR_URL: http://sensor:3003
      # Cognee memory service (optional). Unset MEMORY_URL disables recall/remember
      # and the responder falls back to its built-in runbook substrate.
      MEMORY_URL: ${MEMORY_URL:-http://memory:3005}
      COGNEE_ENABLED: ${COGNEE_ENABLED:-0}
      COGNEE_MEMORY_ENABLED: ${COGNEE_MEMORY_ENABLED:-0}
      # RocketRide native db_neo4j + tool_butterbase pipeline (opt-in).
      RESCUEOPS_NATIVE_PIPELINE: ${RESCUEOPS_NATIVE_PIPELINE:-0}
      # Diagnosis inference provider: butterbase (default) | nebius.
      LLM_PROVIDER: ${LLM_PROVIDER:-butterbase}
      TARGET_DIR: /target
      PORT: "3004"
    ports:
      - "3004:3004"
    depends_on:
      rocketride:
        condition: service_healthy
      sensor:
        condition: service_started

  memory:
    # Cognee semantic-memory service — writes its knowledge graph into the same
    # Neo4j as the code graph (distinct labels). Optional; profile-gated so the
    # baseline stack is unchanged unless you opt in.
    profiles: ["memory"]
    build: ./services/memory
    environment:
      # Cognee graph backend -> shared Neo4j.
      GRAPH_DATABASE_PROVIDER: neo4j
      GRAPH_DATABASE_URL: ${NEO4J_URL:-${NEO4J_URI:-bolt://host.docker.internal:7687}}
      GRAPH_DATABASE_USERNAME: ${NEO4J_USER:-${NEO4J_USERNAME:-neo4j}}
      GRAPH_DATABASE_PASSWORD: ${NEO4J_PASSWORD:-devpassword}
      # Cognee LLM (entity extraction during cognify) — OpenAI-compatible gateway.
      LLM_PROVIDER: ${COGNEE_LLM_PROVIDER:-custom}
      LLM_MODEL: ${COGNEE_LLM_MODEL:-${BUTTERBASE_CHAT_MODEL:-anthropic/claude-sonnet-4.6}}
      LLM_ENDPOINT: ${COGNEE_LLM_ENDPOINT:-${BUTTERBASE_GATEWAY_URL:-https://api.butterbase.ai/v1}}
      LLM_API_KEY: ${COGNEE_LLM_API_KEY:-${BUTTERBASE_API_KEY:-}}
      # Cognee embeddings — reuse Nebius (already the project's embedding provider).
      EMBEDDING_PROVIDER: ${COGNEE_EMBEDDING_PROVIDER:-custom}
      EMBEDDING_MODEL: ${COGNEE_EMBEDDING_MODEL:-${NEBIUS_EMBED_MODEL:-}}
      EMBEDDING_ENDPOINT: ${NEBIUS_BASE_URL:-https://api.tokenfactory.nebius.com/v1}
      EMBEDDING_API_KEY: ${NEBIUS_API_KEY:-}
      EMBEDDING_DIMENSIONS: ${COGNEE_EMBEDDING_DIMENSIONS:-}
      PORT: "3005"
    ports:
      - "3005:3005"

  sensor:
    build: ./services/sensor
    volumes:
      - ./target-repo:/target:ro
      # hide the host's (darwin) node_modules; the sensor installs linux deps here
      - /target/node_modules
    environment:
      NEO4J_URL: ${NEO4J_URL:-${NEO4J_URI:-bolt://host.docker.internal:7687}}
      NEO4J_URI: ${NEO4J_URI:-}
      NEO4J_USER: ${NEO4J_USER:-${NEO4J_USERNAME:-neo4j}}
      NEO4J_USERNAME: ${NEO4J_USERNAME:-}
      NEO4J_PASSWORD: ${NEO4J_PASSWORD:-devpassword}
      NEO4J_DATABASE: ${NEO4J_DATABASE:-}
      TARGET_DIR: /target
      PORT: "3003"
    ports:
      - "3003:3003"
