name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  responder:
    name: responder · typecheck
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: services/responder
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: services/responder/package-lock.json
      - run: npm ci
      - run: npm run typecheck

  sensor:
    name: sensor · typecheck
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: services/sensor
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: services/sensor/package-lock.json
      - run: npm ci
      - run: npm run typecheck

  frontend:
    name: frontend · build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
      - run: npm run build
